<style>
:root{
  --bg:#101418; --surface:#1a2027; --line:#2a323c;
  --tx:#e8ecf1; --mut:#8a94a3;
  --red:#f0544f; --green:#3dbb7d; --amber:#f5b942;

  --sans:-apple-system,'PingFang TC','Microsoft JhengHei',system-ui,sans-serif;
}
*{margin:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);
     font-size:14px;padding:0 12px 60px}
.wrap{max-width:1080px;margin:0 auto}
header{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 16px;
       padding:20px 0 4px}
h1{font-size:16px;font-weight:600;letter-spacing:.08em;color:var(--mut)}
.date{font-family:var(--mono);font-size:26px;font-weight:700}
select{background:var(--surface);color:var(--tx);border:1px solid var(--line);
       border-radius:6px;padding:5px 8px;font-size:13px;margin-left:auto}
.stats{display:flex;gap:0;border:1px solid var(--line);border-radius:8px;
       overflow:hidden;margin:14px 0;font-family:var(--mono)}
.stats div{flex:1;padding:10px 4px;text-align:center;background:var(--surface)}
.stats div+div{border-left:1px solid var(--line)}
.stats b{display:block;font-size:20px}
.stats span{font-size:11px;color:var(--mut);font-family:var(--sans)}
.stats .a b{color:var(--amber)}
/* A級磁磚 (signature) */
.tksec{margin:14px 0}
.tkh{font-size:13px;color:var(--mut);margin-bottom:8px;font-weight:500}
.tkgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.tk{background:var(--surface);border:1px solid var(--line);border-left-width:3px;
    border-radius:7px;padding:9px 12px;font-family:var(--mono)}
.tk .tc{font-size:14px;font-weight:600}
.tk .tr{float:right;font-size:15px;font-weight:700}
.tk .td2{display:block;font-family:var(--sans);font-size:11px;color:var(--mut);margin-top:3px}
.tk.up{border-left-color:var(--red)}.tk.up .tr{color:var(--red)}
.tk.dn{border-left-color:var(--green)}.tk.dn .tr{color:var(--green)}
.tk.out{border-left-color:var(--mut);opacity:.75}.tk.out .tr{color:var(--mut)}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
       gap:8px;margin:0 0 16px}
.tile{background:linear-gradient(160deg,#c03d3a,#8f2724);border-radius:8px;
      padding:10px 12px;color:#fff;font-family:var(--mono);
      display:block;text-decoration:none}
.tile .c{font-size:17px;font-weight:700}
.tile .s{float:right;font-size:22px;font-weight:700;color:#ffe08a}
.tile .d{clear:both;display:block;font-size:11px;opacity:.85;
         font-family:var(--sans);margin-top:4px}
/* 控制列 */
.bar{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 10px;align-items:center}
.chip{background:var(--surface);border:1px solid var(--line);color:var(--mut);
      border-radius:15px;padding:5px 13px;font-size:13px;cursor:pointer}
.chip.on{color:var(--tx);border-color:var(--mut)}
input[type=search]{background:var(--surface);border:1px solid var(--line);
      color:var(--tx);border-radius:6px;padding:6px 10px;font-size:14px;
      width:110px;margin-left:auto}
/* 表格 */
.tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:8px}
table{border-collapse:collapse;width:100%;min-width:920px;
      font-family:var(--mono);font-size:13px}
th{position:sticky;top:0;background:var(--surface);color:var(--mut);
   font-family:var(--sans);font-weight:500;font-size:12px;text-align:right;
   padding:9px 10px;white-space:nowrap;cursor:pointer;user-select:none;
   border-bottom:1px solid var(--line)}
th:first-child,td:first-child{text-align:left;position:sticky;left:0;
   background:var(--bg)}
th:first-child{background:var(--surface);z-index:2}
th.sorted{color:var(--tx)}
td{padding:8px 10px;text-align:right;border-bottom:1px solid var(--line);
   white-space:nowrap}
tr:last-child td{border-bottom:none}
tr.a td:first-child{box-shadow:inset 3px 0 0 var(--amber)}
.pos{color:var(--red)}   /* 台股慣例: 紅=買超/多方 */
.neg{color:var(--green)} /* 綠=賣超/空方 */
.grade-a{color:var(--amber);font-weight:700}
.sig{font-family:var(--sans);font-size:12px;color:var(--mut)}
td.nm{text-align:left;font-family:var(--sans)}
td.gp{color:var(--mut);font-size:12px}
td.th{color:var(--amber);font-size:12px;opacity:.85}
th:nth-child(3),th:nth-child(4){text-align:left}
a.lk{color:inherit;text-decoration:underline;text-decoration-color:var(--mut);text-underline-offset:3px}
a.lk:hover{color:var(--amber)}
th:nth-child(2){text-align:left}
.scorebar{display:inline-block;width:34px;height:5px;background:var(--line);
   border-radius:3px;margin-left:6px;vertical-align:2px;overflow:hidden}
.scorebar i{display:block;height:100%;background:var(--red)}
tr.a .scorebar i{background:var(--amber)}
footer{color:var(--mut);font-size:11px;margin-top:14px;line-height:1.7}
@media(max-width:480px){.date{font-size:21px}.stats b{font-size:17px}}
</style></head>

 if(k==='產業')return`<td class="nm gp">${v}</td>`;
 if(k==='題材')return`<td class="nm th">${v}</td>`;
 if(k==='評分')return`<td><b>${v}</b><span class="scorebar"><i style="width:${v}%"></i></span></td>`;
 if(k==='等級')return`<td class="sig ${v.includes('A級')?'grade-a':''}">${v}</td>`;
 if(k==='訊號')return`<td class="sig">${v}</td>`;
 if(k==='外投3日買超(張)'){const c=v>0?'pos':v<0?'neg':'';
   return`<td class="${c}">${v>0?'+':''}${Number(v).toLocaleString()}</td>`}
 if(k==='投信連買')return`<td class="${v>=3?'pos':''}">${v}</td>`;
 if(k==='MA20斜率')return`<td class="${v>0?'pos':'neg'}">${v}</td>`;
 return`<td>${v}</td>`;
}
function render(){
 let rows=D.filter(r=>{
   if(gradeF==='A級'&&r['評分']<85)return false;
   if(gradeF==='S1突破'&&r['訊號']!=='S1糾結突破')return false;
   if(gradeF==='S2回踩'&&r['訊號']!=='S2順勢回踩')return false;
   if(q&&!(String(r['代號']).includes(q)||String(r['名稱']||'').includes(q)||String(r['產業']||'').includes(q)||String(r['題材']||'').includes(q)))return false;
   return true});
 rows.sort((a,b)=>{const x=a[sortKey]??-1e9,y=b[sortKey]??-1e9;
   return(x<y?-1:x>y?1:0)*(sortDesc?-1:1)});
 document.getElementById('tb').innerHTML=rows.map(r=>
   `<tr class="${r['評分']>=85?'a':''}">${cols.map(([k])=>fmt(k,r[k],r)).join('')}</tr>`).join('');
 document.querySelectorAll('th').forEach(th=>
   th.classList.toggle('sorted',th.dataset.k===sortKey));
 document.getElementById('cnt').textContent=rows.length;
}
document.getElementById('hd').innerHTML=
 '<tr>'+cols.map(([k,lab])=>`<th data-k="${k}">${lab}</th>`).join('')+'</tr>';
document.querySelectorAll('th').forEach(th=>th.onclick=()=>{
 const k=th.dataset.k;
 if(sortKey===k)sortDesc=!sortDesc;else{sortKey=k;sortDesc=true}
 render()});
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
 document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
 c.classList.add('on');gradeF=c.dataset.f;render()});
document.getElementById('q').oninput=e=>{q=e.target.value.trim();render()};
const sel=document.getElementById('hist');
if(sel)sel.onchange=e=>{if(e.target.value)location.href=e.target.value};
render();
</script>
</body></html>
